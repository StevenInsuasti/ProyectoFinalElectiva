# Blueprint de ejemplo para Render.com (ajusta el nombre del servicio y la región).
services:
  - type: web
    name: reservas-espacios-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py crear_superusuario && python manage.py seed_espacios && python manage.py seed_horarios
    startCommand: gunicorn reservas_espacios.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@reservas.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: reservas-espacios-db
          property: connectionString
    autoDeploy: true

databases:
  - name: reservas-espacios-db
    plan: free
    databaseName: reservas_db
    user: reservas
