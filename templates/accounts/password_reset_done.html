{% extends 'base.html' %}
{% block title %}Correo Enviado - ReservaEspacios{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); margin: -1.5rem -12px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-9 col-md-6 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4 text-center p-5">
                    <i class="bi bi-envelope-check text-success fs-1 mb-3"></i>
                    <h3 class="fw-bold">¡Correo Enviado!</h3>
                    <p class="text-muted">
                        Si el correo está registrado, recibirás las instrucciones para restablecer tu contraseña.
                        Revisa también tu carpeta de spam.
                    </p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-2">
                        <i class="bi bi-arrow-left me-1"></i>Volver al Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
